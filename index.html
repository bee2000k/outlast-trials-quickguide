  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d10;
      --panel: #12161c;
      --panel-2: #171d25;
      --text: #d9e1eb;
      --muted: #9aa8b6;
      --faint: #6f7d8a;
      --border: #2a3441;
      --accent-2: #e07964;
      --shadow: rgba(0, 0, 0, 0.35);
      --focus: rgba(224, 121, 100, 0.32);
      --tag-default-bg: rgba(43, 52, 64, 0.82);
      --tag-default-border: #394656;
      --tag-length-bg: rgba(93, 105, 121, 0.22);
      --tag-length-border: #52606f;
      --tag-inv-bg: rgba(176, 105, 32, 0.22);
      --tag-inv-border: #bd792e;
      --tag-inv-text: #ffd39b;
      --tag-jam-bg: rgba(86, 95, 190, 0.26);
      --tag-jam-border: #6973df;
      --tag-jam-text: #c8cdff;
      --tag-rig-bg: rgba(183, 63, 66, 0.25);
      --tag-rig-border: #c75a57;
      --tag-rig-text: #ffc4bd;
      --tag-large-bg: rgba(88, 132, 110, 0.18);
      --tag-large-border: #58906e;
      --tag-large-text: #bdeccc;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(183, 63, 66, 0.13), transparent 34rem),
        radial-gradient(circle at top right, rgba(89, 105, 129, 0.12), transparent 28rem),
        var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.48;
    }
    .shell {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 12px 0 48px;
    }
    .tabs-wrap {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: 0 0 18px;
      padding: 10px 0;
      background: linear-gradient(180deg, rgba(11, 13, 16, 0.98), rgba(11, 13, 16, 0.86) 72%, transparent);
      backdrop-filter: blur(10px);
    }
    .tabs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(118px, 1fr));
      gap: 8px;
      overflow: visible;
      padding: 4px 2px 10px;
    }
    .tab {
      appearance: none;
      width: 100%;
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      padding: 10px 12px;
      font: inherit;
      font-size: 0.93rem;
      cursor: pointer;
      white-space: normal;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease, color 120ms ease;
    }
    .tab:hover {
      transform: translateY(-1px);
      color: var(--text);
      border-color: #435166;
      background: var(--panel-2);
    }
    .tab:focus {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }
    .tab.active {
      color: #fff2ec;
      background: linear-gradient(180deg, #913337, #6f252b);
      border-color: #c75a57;
    }
    .search-wrap {
      position: relative;
      min-width: 0;
      grid-column: span 3;
    }
    .trial-search {
      width: 100%;
      height: 100%;
      min-height: 41px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel);
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
      font-size: 0.93rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    }
    .trial-search::placeholder {
      color: var(--faint);
    }
    .trial-search:focus {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
      border-color: #435166;
    }
    .search-suggestions {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      z-index: 50;
      display: none;
      max-height: min(320px, 60vh);
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(18, 22, 28, 0.98);
      box-shadow: 0 18px 42px rgba(0,0,0,0.42);
      padding: 6px;
    }
    .search-suggestions.open {
      display: block;
    }
    .search-suggestion {
      width: 100%;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--text);
      padding: 9px 10px;
      font: inherit;
      font-size: 0.88rem;
      text-align: left;
      cursor: pointer;
    }
    .search-suggestion:hover,
    .search-suggestion:focus {
      background: rgba(224, 121, 100, 0.14);
      outline: none;
    }
    .search-empty {
      padding: 9px 10px;
      color: var(--faint);
      font-size: 0.86rem;
    }
    .map-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin: 0 0 14px;
    }
    h2 {
      margin: 0;
      font-size: clamp(1.25rem, 2.2vw, 1.65rem);
      letter-spacing: -0.02em;
    }
    .count {
      color: var(--faint);
      font-size: 0.9rem;
      white-space: nowrap;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .trial {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(23, 29, 37, 0.95), rgba(18, 22, 28, 0.95));
      box-shadow: 0 18px 42px rgba(0,0,0,0.22);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 120ms ease, box-shadow 120ms ease, outline-color 120ms ease;
    }
    .trial.selected {
      outline: 3px solid var(--accent-2);
      outline-offset: 3px;
      border-color: var(--accent-2);
      box-shadow:
        0 18px 42px rgba(0,0,0,0.22),
        0 0 0 1px rgba(224, 121, 100, 0.45),
        0 0 26px rgba(224, 121, 100, 0.20);
    }
    .trial-title {
      margin: 0;
      padding: 15px 17px 7px;
      font-size: 1.04rem;
      line-height: 1.25;
      letter-spacing: -0.01em;
    }
    .trial-title strong { color: #f4f0ea; }
    .trial-title a {
      color: inherit;
      text-decoration: none;
    }
    .trial-title a:hover,
    .trial-title a:focus {
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }
    .trial-title a:focus {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
      border-radius: 8px;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0 17px 8px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--tag-default-border);
      border-radius: 999px;
      padding: 4px 8px;
      background: var(--tag-default-bg);
      color: #cbd5df;
      font-size: 0.72rem;
      line-height: 1.15;
      white-space: nowrap;
    }
    .tag.length {
      background: var(--tag-length-bg);
      border-color: var(--tag-length-border);
      color: #dbe4ee;
    }
    .tag.length-very-long {
      background: rgba(183, 63, 66, 0.16);
      border-color: rgba(199, 90, 87, 0.72);
      color: #ffd1cb;
    }
    .tag.length-long {
      background: rgba(176, 105, 32, 0.15);
      border-color: rgba(189, 121, 46, 0.65);
      color: #ffd7a4;
    }
    .tag.inventory {
      background: var(--tag-inv-bg);
      border-color: var(--tag-inv-border);
      color: var(--tag-inv-text);
      font-weight: 700;
    }
    .tag.jammer {
      background: var(--tag-jam-bg);
      border-color: var(--tag-jam-border);
      color: var(--tag-jam-text);
      font-weight: 700;
    }
    .tag.rig {
      background: var(--tag-rig-bg);
      border-color: var(--tag-rig-border);
      color: var(--tag-rig-text);
      font-weight: 800;
    }
    .tag.large {
      background: var(--tag-large-bg);
      border-color: var(--tag-large-border);
      color: var(--tag-large-text);
    }
    ul {
      margin: 0;
      padding: 0 17px 17px 35px;
    }
    li {
      margin: 7px 0;
      color: var(--text);
    }
    li::marker { color: var(--accent-2); }
    .highlight {
      color: #ffd2c4;
      font-weight: 700;
    }
    @media (max-width: 860px) {
      .shell {
        width: min(100vw - 20px, 1180px);
        padding-top: 8px;
      }
      .tabs-wrap {
        position: static;
        top: auto;
        z-index: auto;
        background: transparent;
        backdrop-filter: none;
        margin-bottom: 14px;
      }
      .grid { grid-template-columns: 1fr; }
      .map-header {
        align-items: flex-start;
        flex-direction: column;
        gap: 3px;
      }
      .tabs { grid-template-columns: repeat(auto-fit, minmax(104px, 1fr)); }
      .tab { padding: 9px 10px; font-size: 0.86rem; }
      .trial-search { min-height: 42px; font-size: 0.9rem; }
    }
    @media (max-width: 380px) {
      .search-wrap { grid-column: span 2; }
    }
  </style>
</head>

    const tabsEl = document.getElementById('tabs');
    const contentEl = document.getElementById('content');

    function tagClass(tag) {
      const lower = tag.toLowerCase();
      const classes = ['tag'];
      if (lower.startsWith('solo:')) {
        classes.push('length');
        if (lower.includes('very long')) classes.push('length-very-long');
        else if (lower.includes('long')) classes.push('length-long');
      }
      if (tag === 'Inventory Pressure') classes.push('inventory');
      if (tag === 'Jammer Recommended') classes.push('jammer');
      if (tag === 'Rig Disabling') classes.push('rig');
      if (tag === 'Large Objects') classes.push('large');
      return classes.join(' ');
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function getSearchItems() {
      return maps.flatMap((entry, mapIndex) =>
        entry.trials.map(trial => ({
          label: `${entry.map} - ${trial.name}`,
          name: trial.name,
          map: entry.map,
          mapIndex,
          cardId: `${entry.map}::${trial.name}`
        }))
      );
    }

    function findSearchItem(value) {
      const query = value.trim().toLowerCase();
      if (!query) return null;
      const items = getSearchItems();
      return (
        items.find(item => item.label.toLowerCase() === query) ||
        items.find(item => item.name.toLowerCase() === query) ||
        items.find(item => item.label.toLowerCase().includes(query))
      );
    }

    function jumpToTrial(valueOrItem) {
      const item = typeof valueOrItem === 'string' ? findSearchItem(valueOrItem) : valueOrItem;
      if (!item) return false;

      localStorage.setItem('outlast-selected-trial-card', item.cardId);
      renderMap(item.mapIndex, item.cardId);
      return true;
    }

    function emphasizeMechanics(text) {
      const phrases = [
        'Inventory pressure',
        'Inventory Pressure',
        'Large Object',
        'Large Objects',
        'Sound Detector Gates',
        'Sound Gates',
        'Remote Control Gates',
        'Lockdown Gates',
        'Timed Gates',
        'Proximity Gates',
        'Heavy Object Gates',
        'Jammer Recommended',
        'Limited-use',
        'Limited-Use Gates',
        'Rig Disabling',
        'rig-disabling gate/section',
        'Split/sealed spawn',
        'Push-cart',
        'blacklight',
        'Blacklight',
        'Film reel',
        'Final escape',
        'Prime Assets'
      ];
      let safe = escapeHtml(text);
      safe = safe.replace(/\*\*(.*?)\*\*/g, '<span class="highlight">$1</span>');
      for (const phrase of phrases) {
        const escapedPhrase = phrase.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        safe = safe.replace(new RegExp(escapedPhrase, 'g'), `<span class="highlight">${phrase}</span>`);
      }
      return safe;
    }

    function renderMap(index, scrollToCardId = null) {
      const selected = maps[index];
      document.querySelectorAll('.tab').forEach((tab, i) => {
        tab.classList.toggle('active', i === index);
        tab.setAttribute('aria-selected', i === index ? 'true' : 'false');
      });
      const cards = selected.trials.map(trial => `
        <article class="trial" data-card-id="${escapeHtml(`${selected.map}::${trial.name}`)}" tabindex="0" aria-label="${escapeHtml(`${selected.map} - ${trial.name}`)}">
          <h3 class="trial-title"><strong><a href="${escapeHtml(trial.url)}" target="_blank" rel="noopener noreferrer">${selected.map} - ${trial.name}</a></strong></h3>
          <div class="tags" aria-label="Trial tags">
            ${trial.tags.map(tag => `<span class="${tagClass(tag)}">${escapeHtml(tag)}</span>`).join('')}
          </div>
          <ul>
            ${trial.bullets.map(item => `<li>${emphasizeMechanics(item)}</li>`).join('')}
          </ul>
        </article>
      `).join('');
      contentEl.innerHTML = `
        <div class="map-header">
          <h2>${selected.map}</h2>
          <span class="count">${selected.trials.length} trial${selected.trials.length === 1 ? '' : 's / challenges'}</span>
        </div>
        <div class="grid">${cards}</div>
      `;

      const selectedCardId = scrollToCardId || localStorage.getItem('outlast-selected-trial-card');
      let selectedCard = null;
      if (selectedCardId) {
        selectedCard = contentEl.querySelector(`.trial[data-card-id="${CSS.escape(selectedCardId)}"]`);
        if (selectedCard) selectedCard.classList.add('selected');
      }

      if (scrollToCardId && selectedCard) {
        selectedCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
      } else {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function initTabs() {
      tabsEl.innerHTML = maps.map((entry, index) => `
        <button
          class="tab"
          type="button"
          role="tab"
          aria-selected="${index === 0 ? 'true' : 'false'}"
          data-index="${index}"
        >
          ${entry.map === 'Television Studio' ? 'TV Studio' : entry.map}
        </button>
      `).join('') + `
        <div class="search-wrap">
          <input
            id="trial-search"
            class="trial-search"
            type="search"
            placeholder="Search trials..."
            autocomplete="off"
            aria-label="Search trials and challenges"
          />
          <div id="trial-search-suggestions" class="search-suggestions" role="listbox" aria-label="Trial search suggestions"></div>
        </div>
      `;

      const searchItems = getSearchItems();
      const searchInput = document.getElementById('trial-search');
      const suggestionsEl = document.getElementById('trial-search-suggestions');

      function hideSuggestions() {
        suggestionsEl.classList.remove('open');
        suggestionsEl.innerHTML = '';
      }

      function renderSuggestions(query) {
        const cleaned = query.trim().toLowerCase();
        if (!cleaned) {
          hideSuggestions();
          return;
        }

        const matches = searchItems
          .filter(item =>
            item.label.toLowerCase().includes(cleaned) ||
            item.name.toLowerCase().includes(cleaned) ||
            item.map.toLowerCase().includes(cleaned)
          )
          .slice(0, 8);

        if (!matches.length) {
          suggestionsEl.innerHTML = '<div class="search-empty">No matches</div>';
          suggestionsEl.classList.add('open');
          return;
        }

        suggestionsEl.innerHTML = matches.map((item, index) => `
          <button
            type="button"
            class="search-suggestion"
            role="option"
            data-index="${index}"
          >
            ${escapeHtml(item.label)}
          </button>
        `).join('');

        suggestionsEl.classList.add('open');

        suggestionsEl.querySelectorAll('.search-suggestion').forEach((button, index) => {
          const item = matches[index];

          const choose = event => {
            event.preventDefault();
            event.stopPropagation();
            searchInput.value = item.label;
            hideSuggestions();
            jumpToTrial(item);
          };

          button.addEventListener('touchstart', choose, { passive: false });
          button.addEventListener('pointerdown', choose);
          button.addEventListener('click', choose);
        });
      }

      searchInput.addEventListener('input', event => {
        renderSuggestions(event.target.value);
      });

      searchInput.addEventListener('focus', event => {
        renderSuggestions(event.target.value);
      });

      searchInput.addEventListener('keydown', event => {
        if (event.key === 'Escape') {
          hideSuggestions();
          return;
        }
        if (event.key !== 'Enter') return;
        event.preventDefault();

        const item = findSearchItem(event.target.value);
        if (item) {
          searchInput.value = item.label;
          hideSuggestions();
          jumpToTrial(item);
        }
      });

      document.addEventListener('pointerdown', event => {
        if (!event.target.closest('.search-wrap')) hideSuggestions();
      });
      tabsEl.addEventListener('click', event => {
        const button = event.target.closest('button[data-index]');
        if (!button) return;
        renderMap(Number(button.dataset.index));
      });
      tabsEl.addEventListener('keydown', event => {
        const current = document.activeElement;
        if (!current?.matches?.('button[data-index]')) return;
        const currentIndex = Number(current.dataset.index);
        let nextIndex = currentIndex;
        if (event.key === 'ArrowRight') nextIndex = (currentIndex + 1) % maps.length;
        if (event.key === 'ArrowLeft') nextIndex = (currentIndex - 1 + maps.length) % maps.length;
        if (event.key === 'Home') nextIndex = 0;
        if (event.key === 'End') nextIndex = maps.length - 1;
        if (nextIndex !== currentIndex) {
          event.preventDefault();
          const nextButton = tabsEl.querySelector(`button[data-index="${nextIndex}"]`);
          nextButton.focus();
          renderMap(nextIndex);
        }
      });
      contentEl.addEventListener('click', event => {
        const card = event.target.closest('.trial');
        if (!card) return;

        contentEl.querySelectorAll('.trial.selected').forEach(existing => {
          if (existing !== card) existing.classList.remove('selected');
        });

        card.classList.toggle('selected');

        if (card.classList.contains('selected')) {
          localStorage.setItem('outlast-selected-trial-card', card.dataset.cardId);
        } else {
          localStorage.removeItem('outlast-selected-trial-card');
        }
      });

      contentEl.addEventListener('keydown', event => {
        if (event.key !== 'Enter' && event.key !== ' ') return;
        const card = event.target.closest('.trial');
        if (!card || event.target.closest('a')) return;
        event.preventDefault();
        card.click();
      });

      renderMap(0);
    }
    initTabs();
  </script>
</body>
</html>
